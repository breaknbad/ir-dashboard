<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break'n Bad | Hot Packs TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            overflow: hidden;
        }
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
        }
        .progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #FF4500, #ff8a50);
            z-index: 9999;
            transition: width 0.1s linear;
            box-shadow: 0 0 8px rgba(255,69,0,0.5);
        }
        .mode-label {
            position: fixed;
            top: 12px;
            right: 16px;
            font-family: -apple-system, sans-serif;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            z-index: 9999;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <iframe id="frame" src="index.html"></iframe>
    <div class="progress-bar" id="progress"></div>
    <div class="mode-label" id="modeLabel"></div>

    <script>
        const frame = document.getElementById("frame");
        const progress = document.getElementById("progress");
        const modeLabel = document.getElementById("modeLabel");

        // Timing config
        const OVERVIEW_SCROLL_MS = 20000;    // 20s scrolling through full page
        const PACK_FOCUS_MS = 15000;         // 15s per individual pack card
        const TRANSITION_PAUSE_MS = 800;     // Brief pause between transitions

        let progressTimer;
        let currentTimeout;

        function updateProgress(duration) {
            progress.style.width = "0%";
            clearInterval(progressTimer);
            let start = Date.now();
            progressTimer = setInterval(() => {
                let pct = ((Date.now() - start) / duration) * 100;
                if (pct > 100) pct = 100;
                progress.style.width = pct + "%";
            }, 50);
        }

        function getDoc() {
            try { return frame.contentDocument || frame.contentWindow.document; }
            catch(e) { return null; }
        }

        function smoothScrollTo(doc, targetY, durationMs) {
            return new Promise(resolve => {
                const startY = doc.documentElement.scrollTop || doc.body.scrollTop || 0;
                const dist = targetY - startY;
                const start = Date.now();
                function step() {
                    const elapsed = Date.now() - start;
                    const pct = Math.min(elapsed / durationMs, 1);
                    // Ease in-out
                    const ease = pct < 0.5
                        ? 2 * pct * pct
                        : 1 - Math.pow(-2 * pct + 2, 2) / 2;
                    const y = startY + dist * ease;
                    doc.documentElement.scrollTop = y;
                    doc.body.scrollTop = y;
                    if (pct < 1) requestAnimationFrame(step);
                    else resolve();
                }
                requestAnimationFrame(step);
            });
        }

        async function runCycle() {
            // Phase 1: Load main page and scroll overview
            modeLabel.textContent = "Overview";
            frame.src = "index.html";

            await new Promise(resolve => { frame.onload = resolve; });
            await new Promise(r => setTimeout(r, 500)); // let render finish

            const doc = getDoc();
            if (!doc) { setTimeout(runCycle, 2000); return; }

            // Scroll from top to bottom over OVERVIEW_SCROLL_MS
            const scrollHeight = Math.max(
                doc.body.scrollHeight,
                doc.documentElement.scrollHeight
            );
            const viewHeight = frame.clientHeight;
            const maxScroll = scrollHeight - viewHeight;

            updateProgress(OVERVIEW_SCROLL_MS);
            doc.documentElement.scrollTop = 0;
            doc.body.scrollTop = 0;

            if (maxScroll > 0) {
                await smoothScrollTo(doc, maxScroll, OVERVIEW_SCROLL_MS);
            } else {
                await new Promise(r => setTimeout(r, OVERVIEW_SCROLL_MS));
            }

            // Phase 2: Focus on each pack card individually
            const cards = doc.querySelectorAll(".pack-card");
            const packCount = cards.length;

            if (packCount === 0) {
                // No packs, just loop
                await new Promise(r => setTimeout(r, 3000));
                runCycle();
                return;
            }

            // Calculate per-pack time to fill ~5 min total
            // Total loop = overview (20s) + packs
            // If 10 packs at 15s each = 150s + 20s = 170s (~3 min)
            // Adjust: use PACK_FOCUS_MS as-is, gives a good rhythm

            for (let i = 0; i < packCount; i++) {
                modeLabel.textContent = "Pack " + (i + 1) + " / " + packCount;

                const card = cards[i];
                const rect = card.getBoundingClientRect();
                const cardTop = rect.top + (doc.documentElement.scrollTop || doc.body.scrollTop || 0);

                // Center the card in view
                const targetScroll = Math.max(0, cardTop - (viewHeight / 2) + (rect.height / 2));

                // Highlight current card
                cards.forEach(c => {
                    c.style.transition = "opacity 0.5s, transform 0.5s";
                    c.style.opacity = "0.25";
                    c.style.transform = "scale(0.97)";
                });
                card.style.opacity = "1";
                card.style.transform = "scale(1.03)";
                card.style.zIndex = "10";

                updateProgress(PACK_FOCUS_MS);
                await smoothScrollTo(doc, targetScroll, 800);
                await new Promise(r => setTimeout(r, PACK_FOCUS_MS - 800));

                // Brief transition pause
                await new Promise(r => setTimeout(r, TRANSITION_PAUSE_MS));
            }

            // Reset card styles
            const allCards = doc.querySelectorAll(".pack-card");
            allCards.forEach(c => {
                c.style.opacity = "";
                c.style.transform = "";
                c.style.zIndex = "";
            });

            // Small gap before restarting
            await new Promise(r => setTimeout(r, 1000));

            // Reload page to get fresh data and restart cycle
            runCycle();
        }

        // Start
        runCycle();
    </script>
</body>
</html>
